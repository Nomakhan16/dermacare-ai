<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derma AI | Skin & Hair Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FDFCF8 0%, #F5F0E8 100%);
            min-height: 100vh;
        }

        /* Layout */
        .chat-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #FFFFFF;
            border-right: 1px solid rgba(198, 164, 59, 0.15);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(198, 164, 59, 0.1);
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #1A3B35 0%, #C6A43B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .sidebar-header p {
            color: #8A7E6E;
            font-size: 0.75rem;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #1A3B35 0%, #C6A43B 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(198, 164, 59, 0.3);
        }

        .chat-list {
            flex: 1;
            padding: 1rem;
        }

        .chat-list-item {
            padding: 0.8rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            margin-bottom: 0.3rem;
        }

        .chat-list-item:hover {
            background: rgba(198, 164, 59, 0.08);
        }

        .chat-list-item.active {
            background: rgba(198, 164, 59, 0.12);
            border-left: 3px solid #C6A43B;
        }

        .chat-title {
            font-weight: 600;
            color: #1A3B35;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .chat-preview {
            font-size: 0.7rem;
            color: #8A7E6E;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #FDFCF8;
        }

        .chat-header {
            padding: 1rem 2rem;
            background: #FFFFFF;
            border-bottom: 1px solid rgba(198, 164, 59, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info h3 {
            font-size: 1rem;
            color: #1A3B35;
        }

        .chat-header-info p {
            font-size: 0.7rem;
            color: #8A7E6E;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #F5F0E8;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            animation: fadeInUp 0.3s ease-out;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #1A3B35 0%, #C6A43B 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .message-content {
            max-width: 70%;
            background: #FFFFFF;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            border-top-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            font-size: 0.9rem;
            line-height: 1.5;
            color: #2C3E35;
        }

        .user .message-content {
            background: linear-gradient(135deg, #1A3B35 0%, #C6A43B 100%);
            color: white;
            border-top-right-radius: 5px;
            border-top-left-radius: 18px;
        }

        .message-time {
            font-size: 0.6rem;
            color: #8A7E6E;
            margin-top: 0.3rem;
        }

        .user .message-time {
            color: rgba(255,255,255,0.7);
        }

        /* Input Area */
        .input-area {
            padding: 1rem 2rem;
            background: #FFFFFF;
            border-top: 1px solid rgba(198, 164, 59, 0.1);
        }

        .input-container {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            background: #F5F0E8;
            border-radius: 30px;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            border: 1px solid rgba(198, 164, 59, 0.15);
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.8rem 0;
            font-size: 0.9rem;
            outline: none;
            color: #2C3E35;
        }

        .chat-input::placeholder {
            color: #8A7E6E;
        }

        .send-btn {
            background: linear-gradient(135deg, #1A3B35 0%, #C6A43B 100%);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(198, 164, 59, 0.3);
        }

        /* Voice Button Styles - NEW */
        .voice-btn {
            background: linear-gradient(135deg, #1A3B35 0%, #C6A43B 100%);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .voice-btn:hover {
            transform: scale(1.05);
        }

        .voice-btn.listening {
            animation: pulse 1.5s infinite;
            background: #E76F51;
        }

        .voice-btn.processing {
            background: #F39C12;
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Wave animation while recording */
        .wave-animation {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin-left: 10px;
        }

        .wave-animation span {
            width: 3px;
            height: 10px;
            background: #C6A43B;
            border-radius: 2px;
            animation: wave 0.8s infinite ease-in-out;
        }

        .wave-animation span:nth-child(2) { animation-delay: 0.1s; height: 15px; }
        .wave-animation span:nth-child(3) { animation-delay: 0.2s; height: 20px; }
        .wave-animation span:nth-child(4) { animation-delay: 0.3s; height: 15px; }
        .wave-animation span:nth-child(5) { animation-delay: 0.4s; height: 10px; }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 20px; }
        }

        .recording-indicator {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(231, 111, 81, 0.95);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.6rem 1rem;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #C6A43B;
            border-radius: 50%;
            animation: typing 1s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar, .sidebar::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #F5F0E8;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #C6A43B;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -300px;
                z-index: 1000;
                transition: left 0.3s;
            }
            .sidebar.open {
                left: 0;
            }
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>💬 Derma AI</h2>
                <p>Your skin & hair consultant</p>
                <button class="new-chat-btn" onclick="startNewChat()">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-header-info">
                    <h3><i class="fas fa-robot"></i> Derma AI</h3>
                    <p>Online • Ready to help</p>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        Hi {{ user.name }}! I'm Derma AI, your skincare and haircare assistant. Ask me anything about skin care, hair care, products, or routines.
                        <div class="message-time">Just now</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container" style="position: relative;">
                    <input type="text" class="chat-input" id="userInput" placeholder="Type or speak your question..." onkeypress="handleKeyPress(event)">
                    <button class="voice-btn" id="voiceBtn" onclick="toggleRecording()">🎤</button>
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chats = [];
        let currentChatId = null;

        // ============================================
        // VOICE RECORDING VARIABLES
        // ============================================
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingStartTime = null;

        // ============================================
        // CHAT FUNCTIONS
        // ============================================
        function loadChats() {
            const saved = localStorage.getItem('derma_chats');
            if (saved) {
                chats = JSON.parse(saved);
            } else {
                startNewChat();
            }
            renderChatList();
        }

        function saveChats() {
            localStorage.setItem('derma_chats', JSON.stringify(chats));
            renderChatList();
        }

        function startNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                date: new Date().toISOString(),
                messages: [
                    {
                        text: "Hi! I'm Derma AI, your skincare and haircare assistant. Ask me anything!",
                        isUser: false,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }
                ]
            };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderMessages();
        }

        function selectChat(chatId) {
            currentChatId = chatId;
            renderMessages();
            renderChatList();
        }

        function renderChatList() {
            const container = document.getElementById('chatList');
            container.innerHTML = '';
            chats.forEach(chat => {
                const lastMsg = chat.messages[chat.messages.length - 1];
                const preview = lastMsg.text.substring(0, 40) + (lastMsg.text.length > 40 ? '...' : '');
                const div = document.createElement('div');
                div.className = `chat-list-item ${currentChatId === chat.id ? 'active' : ''}`;
                div.onclick = () => selectChat(chat.id);
                div.innerHTML = `
                    <div class="chat-title">${chat.title}</div>
                    <div class="chat-preview">${preview}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            chat.messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.isUser ? 'user' : 'bot'}`;
                
                let avatar = '';
                if (!msg.isUser) {
                    avatar = '<div class="message-avatar">🤖</div>';
                }
                
                messageDiv.innerHTML = avatar + `
                    <div class="message-content">
                        ${msg.text}
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
                container.appendChild(messageDiv);
            });
            
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(text, isUser) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            const message = {
                text: text,
                isUser: isUser,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            
            chat.messages.push(message);
            
            if (isUser && chat.title === 'New Chat') {
                chat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
            }
            
            saveChats();
            renderMessages();
        }

        function showTypingIndicator() {
            const container = document.getElementById('chatMessages');
            const indicator = document.createElement('div');
            indicator.className = 'message bot';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                removeTypingIndicator();
                addMessage(data.response, false);
            } catch (error) {
                removeTypingIndicator();
                addMessage("Sorry, I'm having trouble. Please try again.", false);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        // ============================================
        // VOICE RECORDING FUNCTIONS
        // ============================================
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(track => track.stop());
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await transcribeAudio(audioBlob);
                };
                
                mediaRecorder.start(1000);
                isRecording = true;
                recordingStartTime = Date.now();
                
                // Update UI
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.classList.add('listening');
                voiceBtn.innerHTML = '⏹️';
                
                // Show recording indicator
                showRecordingIndicator();
                
                // Auto-stop after 60 seconds
                setTimeout(() => {
                    if (isRecording) {
                        stopRecording();
                    }
                }, 60000);
                
            } catch (error) {
                console.error('Microphone error:', error);
                alert('Please allow microphone access to use voice input');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.classList.remove('listening');
                voiceBtn.classList.add('processing');
                voiceBtn.innerHTML = '⏳';
                
                removeRecordingIndicator();
            }
        }

        function showRecordingIndicator() {
            const mainChat = document.querySelector('.main-chat');
            const existingIndicator = document.querySelector('.recording-indicator');
            if (existingIndicator) existingIndicator.remove();
            
            const indicator = document.createElement('div');
            indicator.className = 'recording-indicator';
            indicator.innerHTML = `
                <span style="color: #FF6B6B; font-size: 1rem;">●</span>
                Recording...
                <div class="wave-animation">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
            `;
            mainChat.style.position = 'relative';
            mainChat.appendChild(indicator);
        }

        function removeRecordingIndicator() {
            const indicator = document.querySelector('.recording-indicator');
            if (indicator) indicator.remove();
        }

        async function transcribeAudio(audioBlob) {
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');
            
            try {
                const response = await fetch('/api/transcribe', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.classList.remove('processing');
                voiceBtn.innerHTML = '🎤';
                
                if (data.success && data.text) {
                    const inputField = document.getElementById('userInput');
                    inputField.value = data.text;
                    
                    // Highlight the input field briefly
                    inputField.style.border = '2px solid #C6A43B';
                    setTimeout(() => {
                        inputField.style.border = '';
                    }, 1500);
                    
                } else {
                    alert('Could not transcribe. Please try again or type your message.');
                }
                
            } catch (error) {
                console.error('Transcription error:', error);
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.classList.remove('processing');
                voiceBtn.innerHTML = '🎤';
                alert('Error transcribing audio. Please check your connection.');
            }
        }

        loadChats();
    </script>
</body>
</html>
